name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'call-script/**'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: call-script/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: call-script

      - name: Build
        run: npm run build
        working-directory: call-script
        env:
          VITE_GEMINI_KEY: ${{ secrets.VITE_GEMINI_KEY }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: call-script/dist

      - uses: actions/deploy-pages@v4
        id: deployment
